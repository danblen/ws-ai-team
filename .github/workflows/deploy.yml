name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'both'
        type: choice
        options:
          - pages
          - aws
          - both

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-pages:
    if: github.event_name == 'push' || inputs.target == 'pages' || inputs.target == 'both'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-aws:
    if: github.event_name == 'push' || inputs.target == 'aws' || inputs.target == 'aliyun' || inputs.target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 44.194.211.249
          username: ec2-user
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd $HOME/ws/aiteam
            git pull --no-rebase origin main

            # Build frontend inside the runtime container (no image rebuild needed)
            docker run --rm -e NODE_ENV=development -v "$(pwd):/app" -w /app aiteam sh -c "npm install && npm run build"

            # Start container with code mounted, or restart if already running
            if docker inspect aiteam >/dev/null 2>&1; then
              docker restart aiteam
            else
              docker run -d --name aiteam --restart unless-stopped \
                -p 5110:5110 \
                -m 1.4g --memory-swap 1.7g --cpus 1.5 \
                -v $HOME/ws/aiteam:/app \
                -v $HOME/ws/aiteamoutput:/aiteamoutput \
                --env-file $HOME/ws/aiteam/.env \
                aiteam
            fi

            # 阿里云部署（通过 AWS 转发，因为 GitHub Actions 直接连阿里云可能不通）
            ssh -o StrictHostKeyChecking=no -i $HOME/.ssh/id_ed25519 root@106.14.225.158 << 'ALIYUN_EOF'
              set -e
              cd /root/ws/aiteam
              git pull --no-rebase origin main
              docker run --rm -e NODE_ENV=development -v "$(pwd):/app":Z -w /app aiteam sh -c "npm install && npm run build"
              if docker inspect aiteam >/dev/null 2>&1; then
                docker restart aiteam
              else
                docker run -d --name aiteam --restart unless-stopped \
                  -p 5110:5110 \
                  -m 1.4g \
                  -v /root/ws/aiteam:/app:Z \
                  -v /root/ws/aiteamoutput:/aiteamoutput:Z \
                  --env-file /root/ws/aiteam/.env \
                  aiteam
              fi
ALIYUN_EOF
